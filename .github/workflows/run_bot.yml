name: WG-Gesucht Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Restore state files
        uses: actions/cache/restore@v4
        with:
          path: |
            seen_offers.json
            pending_messages.json
            session.json
            daily_results.json
          key: wg-bot-state

      - name: Run bot
        env:
          WG_EMAIL: ${{ secrets.WG_EMAIL }}
          WG_PASSWORD: ${{ secrets.WG_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python bot.py

      - name: Save state files
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen_offers.json
            pending_messages.json
            session.json
            daily_results.json
          key: wg-bot-state-${{ github.run_id }}
